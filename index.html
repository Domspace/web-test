<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Epic Site</h1>
        <div class="links">
            <a href="https://git.domspace.org">Forgejo</a>
            <a href="https://bennet-lab.de">Bennet-Lab</a>
        </div>
        <div class="card">
            <h2>Stats:</h2>
            <ul>
                <li>CPU: Alle</li>
                <li>RAM: noch da</li>
                <li>OS: Debian</li>
            </ul>
        </div>
        <div class="timestamp">
            <p>Last Update: <span id="time"></span></p>
        </div>
    </div>

    <script>
        document.getElementById('time').textContent = new Date().toLocaleString();
    </script>
</body>
</html>
